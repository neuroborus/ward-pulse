name: Phone Android

on:
  push:
    paths:
      - "apps/phone_flutter/**"
      - "bindings/dart/**"
      - "core/**"
      - "fixtures/**"
      - "tools/build-android-rust/**"
      - "justfile"
      - ".github/workflows/phone-android.yml"
  pull_request:
    paths:
      - "apps/phone_flutter/**"
      - "bindings/dart/**"
      - "core/**"
      - "fixtures/**"
      - "tools/build-android-rust/**"
      - "justfile"
      - ".github/workflows/phone-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phone-android:
    name: Analyze, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: apps/phone_flutter
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android
      - run: sdkmanager "ndk;29.0.14206865"
        working-directory: .
      - run: cargo install cargo-ndk --version 4.1.2 --locked
        working-directory: .
      - run: flutter pub get --enforce-lockfile
      - run: flutter analyze
      - run: flutter test
      - run: tools/build-android-rust/build.sh
        working-directory: .
      - run: flutter build apk --debug
