name: Phone Android

on:
  push:
    paths:
      - "apps/phone_flutter/**"
      - "justfile"
      - ".github/workflows/phone-android.yml"
  pull_request:
    paths:
      - "apps/phone_flutter/**"
      - "justfile"
      - ".github/workflows/phone-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  phone-android:
    name: Analyze, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/phone_flutter
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.6
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug
