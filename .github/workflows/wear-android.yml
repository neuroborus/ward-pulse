name: Wear Android

on:
  push:
    paths:
      - "apps/wear_android/**"
      - "justfile"
      - ".github/workflows/wear-android.yml"
  pull_request:
    paths:
      - "apps/wear_android/**"
      - "justfile"
      - ".github/workflows/wear-android.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wear-android:
    name: Lint, test, and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/wear_android
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-37.1" "build-tools;36.0.0"
      - run: ./gradlew --no-daemon lintDebug testDebugUnitTest assembleDebug assembleDebugAndroidTest
